version: "3.9"

services:
  postgres:
    image: postgres:16
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "6379:6379"

  ollama:
    image: ollama/ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD-SHELL", "ollama list > /dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # Pulls required LLM models on first boot; skipped if already cached in the volume.
  ollama-init:
    image: ollama/ollama
    volumes:
      - ollama_data:/root/.ollama
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: >
      sh -c "
        echo 'Pulling llama3...' &&
        ollama pull llama3 --host http://ollama:11434 &&
        echo 'Pulling mistral...' &&
        ollama pull mistral --host http://ollama:11434 &&
        echo 'Models ready.'
      "
    restart: "no"

  # Runs Alembic migrations before the API services start.
  migrate:
    build: ./services/patient_api
    command: >
      sh -c "pip install alembic psycopg2-binary --quiet &&
             cd /migrations &&
             alembic upgrade head"
    volumes:
      - ./alembic:/migrations/alembic
      - ./alembic.ini:/migrations/alembic.ini
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.104.0
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8889:8889"
    depends_on:
      - jaeger

  jaeger:
    image: jaegertracing/all-in-one:1.58
    ports:
      - "16686:16686"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"

  prometheus:
    image: prom/prometheus:v2.53.0
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    depends_on:
      - otel-collector

  grafana:
    image: grafana/grafana:11.1.0
    ports:
      - "3030:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    depends_on:
      - prometheus
      - jaeger

  patient-api:
    build: ./services/patient_api
    ports:
      - "8001:8001"
    env_file: .env
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      otel-collector:
        condition: service_started
    volumes:
      - ./data:/app/data
    restart: on-failure

  doctor-api:
    build: ./services/doctor_api
    ports:
      - "8002:8002"
    env_file: .env
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      otel-collector:
        condition: service_started
    volumes:
      - ./data:/app/data
    restart: on-failure

  postcare-api:
    build: ./services/postcare_api
    ports:
      - "8003:8003"
    env_file: .env
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      otel-collector:
        condition: service_started
    volumes:
      - ./data:/app/data
    restart: on-failure

  patient-portal:
    build: ./frontend/patient_portal
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      NEXT_PUBLIC_PATIENT_API_URL: http://localhost:8001
      NEXT_PUBLIC_POSTCARE_API_URL: http://localhost:8003

  doctor-portal:
    build: ./frontend/doctor_portal
    ports:
      - "3001:3001"
    env_file: .env
    environment:
      NEXT_PUBLIC_DOCTOR_API_URL: http://localhost:8002
      NEXT_PUBLIC_POSTCARE_API_URL: http://localhost:8003

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.14.1
    ports:
      - "5001:5000"
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
    volumes:
      - mlflow_data:/mlflow
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000/health')\" 2>/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  retrain-worker:
    build: ./services/retrain_worker
    env_file: .env
    environment:
      RETRAIN_POLL_INTERVAL_SECONDS: "300"
      MIN_RETRAIN_BATCH: "5"
      BASE_MODEL_NAME: "TinyLlama/TinyLlama-1.1B-Chat-v1.0"
      FINE_TUNED_MODEL_NAME: "medical-risk-ft"
      LLAMA_CPP_DIR: "/opt/llama.cpp"
      MODELS_DIR: "/app/models"
      RETRAIN_BUFFER_PATH: "/app/data/retrain_buffer.jsonl"
      RETRAIN_LOG_PATH: "/app/data/retrain_log.jsonl"
      LORA_RANK: "8"
      LORA_ALPHA: "16"
      LORA_EPOCHS: "2"
      LORA_LR: "2e-4"
      MLFLOW_TRACKING_URI: "http://mlflow:5000"
    volumes:
      - ./data:/app/data
      - ./scripts:/app/scripts
      - model_artifacts:/app/models
      - hf_cache:/root/.cache/huggingface
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
      mlflow:
        condition: service_healthy
    restart: on-failure

volumes:
  postgres_data:
  ollama_data:
  model_artifacts:
  hf_cache:
  prometheus_data:
  grafana_data:
  mlflow_data:
