version: "3.9"

services:
  postgres:
    image: postgres:16
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "6379:6379"

  ollama:
    image: ollama/ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # Pulls required LLM models on first boot; skipped if already cached in the volume.
  ollama-init:
    image: ollama/ollama
    volumes:
      - ollama_data:/root/.ollama
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: >
      sh -c "
        echo 'Pulling llama3...' &&
        ollama pull llama3 --host http://ollama:11434 &&
        echo 'Pulling mistral...' &&
        ollama pull mistral --host http://ollama:11434 &&
        echo 'Models ready.'
      "
    restart: "no"

  # Runs Alembic migrations before the API services start.
  migrate:
    build: ./services/patient_api
    command: >
      sh -c "pip install alembic psycopg2-binary --quiet &&
             cd /migrations &&
             alembic upgrade head"
    volumes:
      - ./alembic:/migrations/alembic
      - ./alembic.ini:/migrations/alembic.ini
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  patient-api:
    build: ./services/patient_api
    ports:
      - "8001:8001"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - ./data:/app/data
    restart: on-failure

  doctor-api:
    build: ./services/doctor_api
    ports:
      - "8002:8002"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - ./data:/app/data
    restart: on-failure

  postcare-api:
    build: ./services/postcare_api
    ports:
      - "8003:8003"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - ./data:/app/data
    restart: on-failure

  patient-portal:
    build: ./frontend/patient_portal
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      NEXT_PUBLIC_PATIENT_API_URL: http://localhost:8001
      NEXT_PUBLIC_POSTCARE_API_URL: http://localhost:8003

  doctor-portal:
    build: ./frontend/doctor_portal
    ports:
      - "3001:3001"
    env_file: .env
    environment:
      NEXT_PUBLIC_DOCTOR_API_URL: http://localhost:8002
      NEXT_PUBLIC_POSTCARE_API_URL: http://localhost:8003

volumes:
  postgres_data:
  ollama_data:
